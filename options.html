<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Forever Tabs — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <h1>Forever Tabs</h1>
  <p>These URLs will be opened as pinned tabs in every new window.</p>

  <form id="add-form">
    <input type="url" id="url-input" placeholder="https://example.com" required>
    <button type="submit">Add</button>
  </form>

  <ul id="tab-list"></ul>

  <script src="options.js"></script>
</body>
</html>
